Meta:
  type: object
  required: [contractVersion, generatedAt, traceId, partial, warnings]
  additionalProperties: true
  properties:
    contractVersion: { type: string, example: "0.1.0" }
    generatedAt: { type: string, format: date-time }
    traceId: { type: string }
    partial: { type: boolean }
    warnings:
      type: array
      items: { type: string }
Pagination:
  type: object
  additionalProperties: true
  properties:
    limit: { type: integer, minimum: 1 }
    offset: { type: integer, minimum: 0 }
    total: { type: integer, minimum: 0 }
    nextCursor: { type: [string, "null"] }
Problem:
  type: object
  required: [type, title, status, detail, instance, traceId]
  additionalProperties: true
  properties:
    type: { type: string, format: uri-reference }
    title: { type: string }
    status: { type: integer }
    detail: { type: string }
    instance: { type: string }
    traceId: { type: string }
    errors:
      type: array
      items:
        type: object
        additionalProperties: true
AuthProvider:
  type: object
  required: [provider, label, configured, loginUrl]
  additionalProperties: true
  properties:
    provider: { type: string, enum: [google, github] }
    label: { type: string }
    configured: { type: boolean }
    loginUrl: { type: string }
AuthProviderListEnvelope:
  type: object
  required: [data, meta]
  properties:
    data:
      type: array
      items: { $ref: "#/AuthProvider" }
    meta: { $ref: "#/Meta" }
AuthUser:
  type: object
  required: [userId, provider, providerSubject, displayName]
  additionalProperties: true
  properties:
    userId: { type: string }
    provider: { type: string, enum: [google, github] }
    providerSubject: { type: string }
    displayName: { type: string }
    email: { type: [string, "null"] }
    avatarUrl: { type: [string, "null"] }
AuthSession:
  type: object
  required: [authenticated]
  additionalProperties: true
  properties:
    authenticated: { type: boolean }
    user: { anyOf: [{ $ref: "#/AuthUser" }, { type: "null" }] }
    expiresAt: { type: [string, "null"], format: date-time }
AuthSessionEnvelope:
  type: object
  required: [data, meta]
  properties:
    data: { $ref: "#/AuthSession" }
    meta: { $ref: "#/Meta" }
GoogleDrivePickerConfig:
  type: object
  required: [configured, clientId, apiKey, appId, scopes, missing]
  additionalProperties: true
  properties:
    configured: { type: boolean }
    clientId: { type: [string, "null"] }
    apiKey: { type: [string, "null"] }
    appId: { type: [string, "null"] }
    scopes:
      type: object
      required: [files, folders]
      additionalProperties: false
      properties:
        files: { type: string }
        folders: { type: string }
    missing:
      type: array
      items: { type: string }
GoogleDrivePickerConfigEnvelope:
  type: object
  required: [data, meta]
  properties:
    data: { $ref: "#/GoogleDrivePickerConfig" }
    meta: { $ref: "#/Meta" }
HealthEnvelope:
  type: object
  required: [data, meta]
  properties:
    data:
      type: object
      required: [status]
      additionalProperties: true
      properties:
        status: { type: string, example: "ok" }
        serviceVersion: { type: string }
    meta: { $ref: "#/Meta" }

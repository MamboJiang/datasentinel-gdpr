Source:
  type: object
  required: [sourceId, name, sourceType, status]
  additionalProperties: true
  properties:
    sourceId: { type: string }
    name: { type: string }
    sourceType: { type: string, example: "local_repo" }
    status: { type: string, example: "connected" }
    rootLabel: { type: [string, "null"] }
    masterOfDataUserId: { type: [string, "null"] }
    referenceUrl: { type: [string, "null"], format: uri }
    sampleFamilies:
      type: array
      items: { type: string }
    config:
      type: object
      additionalProperties: true
CreateSourceRequest:
  type: object
  required: [sourceId, name, sourceType]
  additionalProperties: true
  properties:
    sourceId: { type: string }
    name: { type: string }
    sourceType:
      type: string
      examples: ["local_repo", "remote_file_link", "google_drive_selection"]
    config:
      type: object
      additionalProperties: true
      description: Source-specific configuration. For `remote_file_link`, use `url` for a supported text-like file or PDF text layer. For `google_drive_selection`, use selected `items` returned by Google Picker. For `local_repo`, use `rootPath`.
    masterOfDataUserId: { type: [string, "null"] }
SourceEnvelope:
  type: object
  required: [data, meta]
  properties:
    data: { $ref: "#/Source" }
    meta: { $ref: "./common.yaml#/Meta" }
SourceListEnvelope:
  type: object
  required: [data, meta]
  properties:
    data:
      type: array
      items: { $ref: "#/Source" }
    meta: { $ref: "./common.yaml#/Meta" }
ConnectionTestEnvelope:
  type: object
  required: [data, meta]
  properties:
    data:
      type: object
      required: [sourceId, reachable]
      additionalProperties: true
      properties:
        sourceId: { type: string }
        reachable: { type: boolean }
        message: { type: string }
    meta: { $ref: "./common.yaml#/Meta" }
StartFullScanRequest:
  type: object
  required: [sourceId]
  additionalProperties: true
  properties:
    sourceId: { type: string }
    deterministicMode: { type: boolean, default: true }
    runEvaluation: { type: boolean, default: true }
    authorization:
      type: object
      additionalProperties: false
      description: Per-scan short-lived authorization. Tokens must not be stored by the server.
      properties:
        googleDriveAccessToken: { type: string }
StartDeltaScanRequest:
  type: object
  required: [sourceId]
  additionalProperties: true
  properties:
    sourceId: { type: string }
    modifiedSince: { type: [string, "null"], format: date-time }
    baselineScanId: { type: [string, "null"] }
Scan:
  type: object
  required: [scanId, sourceId, scanType, status, progress]
  additionalProperties: true
  properties:
    scanId: { type: string }
    sourceId: { type: string }
    scanType: { type: string, example: "full" }
    status: { type: string, example: "completed" }
    stage: { type: string, example: "extracting_content" }
    progress: { type: number, minimum: 0, maximum: 1 }
    totalFiles: { type: integer, minimum: 0 }
    scannedFiles: { type: integer, minimum: 0 }
    flaggedFiles: { type: integer, minimum: 0 }
    totalBytes: { type: integer, minimum: 0 }
    durationMs: { type: [integer, "null"], minimum: 0 }
    throughputFilesPerSecond: { type: [number, "null"] }
    reproducibilityFingerprint: { type: [string, "null"] }
    pipelineStages:
      type: array
      items:
        type: object
        additionalProperties: true
        properties:
          stage: { type: string }
          status: { type: string }
          processedFiles: { type: integer, minimum: 0 }
          totalFiles: { type: integer, minimum: 0 }
          warnings:
            type: array
            items: { type: string }
    fileInventory:
      type: object
      additionalProperties: true
      properties:
        status: { type: string }
        sourceSnapshotId: { type: string }
        inventoryFingerprint: { type: string }
        totalCandidateFiles: { type: integer, minimum: 0 }
        fingerprintedFiles: { type: integer, minimum: 0 }
        skippedFiles: { type: integer, minimum: 0 }
        totalBytes: { type: integer, minimum: 0 }
        permissionSnapshots: { type: integer, minimum: 0 }
        sampleFamilies:
          type: array
          items:
            type: object
            additionalProperties: true
        warnings:
          type: array
          items: { type: string }
    contentExtraction:
      type: object
      additionalProperties: true
      properties:
        status: { type: string }
        extractionFingerprint: { type: string }
        processedFiles: { type: integer, minimum: 0 }
        successfulFiles: { type: integer, minimum: 0 }
        warningFiles: { type: integer, minimum: 0 }
        unsupportedFiles: { type: integer, minimum: 0 }
        ocrDeferredFiles: { type: integer, minimum: 0 }
        redactedEvidenceCandidates: { type: integer, minimum: 0 }
        rawContentExposed: { type: boolean }
        aiAssistanceUsed: { type: boolean }
        modelCalls: { type: integer, minimum: 0 }
        recognitionDifficulty:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
          properties:
            easy: { type: integer, minimum: 0 }
            moderate: { type: integer, minimum: 0 }
            hard: { type: integer, minimum: 0 }
            unsupported: { type: integer, minimum: 0 }
        formatCounts:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              format: { type: string }
              difficulty: { type: string }
              method: { type: string }
              files: { type: integer, minimum: 0 }
        methods:
          type: array
          items:
            type: object
            additionalProperties: true
        warnings:
          type: array
          items: { type: string }
    signalDetection:
      type: object
      additionalProperties: true
      properties:
        status: { type: string }
        detectorRulesVersion: { type: string }
        detectorRulesHash: { type: string }
        evidenceRequirements:
          type: array
          items: { type: string }
        evaluatedEvidenceCandidates: { type: integer, minimum: 0 }
        detectedSignals: { type: integer, minimum: 0 }
        redactedSignals: { type: integer, minimum: 0 }
        findingsWithSignals: { type: integer, minimum: 0 }
        rawContentExposed: { type: boolean }
        signalTypeCounts:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              type: { type: string }
              signals: { type: integer, minimum: 0 }
              evidenceRequirement: { type: string }
        warnings:
          type: array
          items: { type: string }
    contextRisk:
      type: object
      additionalProperties: true
      properties:
        status: { type: string }
        policyPackVersion: { type: string }
        riskRulesFingerprint: { type: string }
        assessedEvidenceCandidates: { type: integer, minimum: 0 }
        contextClassifiedFindings: { type: integer, minimum: 0 }
        riskAssessedFindings: { type: integer, minimum: 0 }
        highRiskFindings: { type: integer, minimum: 0 }
        mediumRiskFindings: { type: integer, minimum: 0 }
        lowRiskFindings: { type: integer, minimum: 0 }
        retentionReviewFiles: { type: integer, minimum: 0 }
        humanReviewRequiredFindings: { type: integer, minimum: 0 }
        legalConclusionProvided: { type: boolean }
        contextCategories:
          type: array
          items:
            type: object
            additionalProperties: true
        warnings:
          type: array
          items: { type: string }
    ownerAssignment:
      type: object
      additionalProperties: true
      properties:
        status: { type: string }
        policyPackVersion: { type: string }
        organizationModelVersion: { type: string }
        ownerResolutionStrategy: { type: string }
        assignmentRulesFingerprint: { type: string }
        humanReviewRequiredFindings: { type: integer, minimum: 0 }
        assignedFindings: { type: integer, minimum: 0 }
        directOwnerAssignments: { type: integer, minimum: 0 }
        masterOfDataAssignments: { type: integer, minimum: 0 }
        escalationAssignments: { type: integer, minimum: 0 }
        unownedFindings: { type: integer, minimum: 0 }
        transferOptionCount: { type: integer, minimum: 0 }
        escalationOptionCount: { type: integer, minimum: 0 }
        sourceOwnerAvailable: { type: boolean }
        warnings:
          type: array
          items: { type: string }
    findingAssembly:
      type: object
      additionalProperties: true
      properties:
        status: { type: string }
        policyPackVersion: { type: string }
        sourceSnapshotId: { type: string }
        assemblyRulesFingerprint: { type: string }
        assembledFindings: { type: integer, minimum: 0 }
        evidenceCards: { type: integer, minimum: 0 }
        evidenceSignals: { type: integer, minimum: 0 }
        redactedEvidenceSnippets: { type: integer, minimum: 0 }
        missingEvidenceCards: { type: integer, minimum: 0 }
        deniedActionCount: { type: integer, minimum: 0 }
        rawContentExposed: { type: boolean }
        legalConclusionProvided: { type: boolean }
        warnings:
          type: array
          items: { type: string }
    reviewSupport:
      type: object
      additionalProperties: true
      properties:
        status: { type: string }
        policyPackVersion: { type: string }
        organizationModelVersion: { type: string }
        supportRulesFingerprint: { type: string }
        reviewableFindings: { type: integer, minimum: 0 }
        supportedFindings: { type: integer, minimum: 0 }
        allowedActionCount: { type: integer, minimum: 0 }
        deniedActionCount: { type: integer, minimum: 0 }
        availableDecisionCount: { type: integer, minimum: 0 }
        reasonRequiredDecisionCount: { type: integer, minimum: 0 }
        checklistItemCount: { type: integer, minimum: 0 }
        transferOptionCount: { type: integer, minimum: 0 }
        escalationOptionCount: { type: integer, minimum: 0 }
        rawContentExposed: { type: boolean }
        legalConclusionProvided: { type: boolean }
        warnings:
          type: array
          items: { type: string }
    auditRecording:
      type: object
      additionalProperties: true
      properties:
        status: { type: string }
        policyPackVersion: { type: string }
        auditRulesFingerprint: { type: string }
        recordedEventCount: { type: integer, minimum: 0 }
        linkedScanEvents: { type: integer, minimum: 0 }
        linkedFindingEvents: { type: integer, minimum: 0 }
        reviewDecisionEvents: { type: integer, minimum: 0 }
        systemEvents: { type: integer, minimum: 0 }
        humanEvents: { type: integer, minimum: 0 }
        rawContentExposed: { type: boolean }
        legalConclusionProvided: { type: boolean }
        deletionExecuted: { type: boolean }
        warnings:
          type: array
          items: { type: string }
    deltaScan:
      type: object
      additionalProperties: true
      properties:
        status: { type: string }
        baselineScanId: { type: string }
        baselineSourceSnapshotId: { type: string }
        baselineInventoryFingerprint: { type: string }
        baselineTotalFiles: { type: integer, minimum: 0 }
        baselineFindingCount: { type: integer, minimum: 0 }
        deltaFingerprint: { type: string }
        changedFiles: { type: integer, minimum: 0 }
        newFiles: { type: integer, minimum: 0 }
        modifiedFiles: { type: integer, minimum: 0 }
        unchangedFiles: { type: integer, minimum: 0 }
        missingFiles: { type: integer, minimum: 0 }
        processedChangedFiles: { type: integer, minimum: 0 }
        carriedForwardFiles: { type: integer, minimum: 0 }
        reopenedFindings: { type: integer, minimum: 0 }
        unchangedFindingsCarriedForward: { type: integer, minimum: 0 }
        missingFilesTreatedAsDeleted: { type: boolean }
        rawContentExposed: { type: boolean }
        legalConclusionProvided: { type: boolean }
        deletionExecuted: { type: boolean }
        warnings:
          type: array
          items: { type: string }
    aiProcessing:
      type: object
      additionalProperties: true
      properties:
        status: { type: string }
        mode: { type: string }
        provider: { type: string }
        model: { type: string }
        budgetLimitEur: { type: number, minimum: 0 }
        budgetLimitUsd: { type: number, minimum: 0 }
        usageBaselineUsd: { type: [number, "null"], minimum: 0 }
        budgetGuard: { type: string }
        maxPromptTokens: { type: integer, minimum: 0 }
        maxCompletionTokens: { type: integer, minimum: 0 }
        atlasReference: { type: string }
        atlasAlignment:
          type: array
          items:
            type: object
            additionalProperties: true
        tierPlan:
          type: array
          items:
            type: object
            additionalProperties: true
        modelCalls: { type: integer, minimum: 0 }
        estimatedCostUsd: { type: number, minimum: 0 }
        paidServiceUsed: { type: boolean }
        rawContentExposed: { type: boolean }
        legalConclusionProvided: { type: boolean }
        deletionExecuted: { type: boolean }
ScanEnvelope:
  type: object
  required: [data, meta]
  properties:
    data: { $ref: "#/Scan" }
    meta: { $ref: "./common.yaml#/Meta" }

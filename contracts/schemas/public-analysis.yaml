PublicAnalysisCapacity:
  type: object
  required: [maxActive, activeAnalyses, availableSlots, waitingUsers, queueMode, userHasActiveAnalysis, fileSizeLimitBytes]
  additionalProperties: true
  properties:
    maxActive: { type: integer, minimum: 0 }
    activeAnalyses: { type: integer, minimum: 0 }
    availableSlots: { type: integer, minimum: 0 }
    waitingUsers: { type: integer, minimum: 0 }
    queueMode:
      type: string
      description: Public analysis uses capacity guarding, not a durable worker queue.
      example: "capacity_guard"
    userHasActiveAnalysis: { type: boolean }
    userQueuePosition: { type: [integer, "null"], minimum: 1 }
    fileSizeLimitBytes: { type: integer, minimum: 1 }
PublicAnalysisFile:
  type: object
  required: [name, sizeBytes, fileFormat, extractionMethod, recognitionDifficulty]
  additionalProperties: true
  properties:
    name: { type: string }
    sizeBytes: { type: integer, minimum: 0 }
    fileFormat: { type: string }
    extractionMethod: { type: string }
    recognitionDifficulty: { type: string }
PublicAnalysisDetectedType:
  type: object
  required: [type, count, highestConfidence]
  additionalProperties: true
  properties:
    type: { type: string }
    count: { type: integer, minimum: 1 }
    highestConfidence: { type: number, minimum: 0, maximum: 1 }
PublicAnalysisSummary:
  type: object
  required:
    - detectedSignalCount
    - detectedTypes
    - riskLevel
    - reviewRecommendation
    - rawContentExposed
    - legalConclusionProvided
    - deletionAvailable
  additionalProperties: true
  properties:
    detectedSignalCount: { type: integer, minimum: 0 }
    detectedTypes:
      type: array
      items: { $ref: "#/PublicAnalysisDetectedType" }
    riskLevel: { type: string, examples: ["none", "low", "medium", "high"] }
    plainLanguageSummary: { $ref: "#/PublicAnalysisPlainLanguageSummary" }
    reviewRecommendation: { type: string }
    nextSteps:
      type: array
      description: Optional accountable next steps derived from the redacted result; clients must tolerate absence.
      items: { type: string }
    workflowReadiness:
      type: array
      description: Optional notes explaining whether the result can be handed to governed Workspace workflows.
      items: { type: string }
    boundaryNotes:
      type: array
      description: Optional public-entry boundaries shown alongside the result.
      items: { type: string }
    rawContentExposed: { type: boolean }
    legalConclusionProvided: { type: boolean }
    deletionAvailable: { type: boolean }
PublicAnalysisPlainLanguageSummary:
  type: object
  required: [headline, explanation, gdprRelevance, reviewFocus]
  additionalProperties: true
  description: Optional human-readable explanation generated from detected signal categories, counts, risk level, file format, and redacted evidence locations. It must not include raw source values or claim legal compliance.
  properties:
    headline: { type: string }
    explanation: { type: string }
    gdprRelevance: { type: string }
    reviewFocus: { type: string }
    detectedCategoryLabels:
      type: array
      items: { type: string }
    evidenceLocations:
      type: array
      items: { type: string }
PublicAnalysisEvidence:
  type: object
  required: [type, detector, confidence, snippet, locationLabel]
  additionalProperties: true
  properties:
    type: { type: string }
    detector: { type: string }
    confidence: { type: number, minimum: 0, maximum: 1 }
    snippet: { type: string }
    locationLabel: { type: string }
    location: { $ref: "#/PublicAnalysisEvidenceLocation" }
PublicAnalysisEvidenceLocation:
  type: object
  required: [format, label, rawContentExposed]
  additionalProperties: true
  description: Redacted, source-data-derived location metadata for review focus. It must not contain raw extracted text, raw file bytes, private host paths, page images, or uploaded-source values.
  properties:
    format: { type: string }
    anchorId: { type: string }
    label: { type: string }
    rawContentExposed: { type: boolean, enum: [false] }
    selector: { $ref: "#/PublicAnalysisEvidenceSelector" }
PublicAnalysisEvidenceSelector:
  type: object
  additionalProperties: true
  description: Public-safe file-internal coordinates. User-authored names such as archive member names and sheet names are omitted from the public payload.
  properties:
    type: { type: string, examples: ["textPosition", "tableCell", "structurePath"] }
    start: { type: integer, minimum: 0 }
    end: { type: integer, minimum: 0 }
    sourceStart: { type: integer, minimum: 0 }
    sourceEnd: { type: integer, minimum: 0 }
    page: { type: integer, minimum: 1 }
    row: { type: integer, minimum: 1 }
    column: { type: integer, minimum: 1 }
    columnLabel: { type: string }
    path: { type: string }
    partName: { type: string }
    paragraphIndex: { type: integer, minimum: 1 }
    slideNumber: { type: integer, minimum: 1 }
    shapeIndex: { type: integer, minimum: 1 }
    tagName: { type: string }
    nodeIndex: { type: integer, minimum: 0 }
    recordIndex: { type: integer, minimum: 1 }
    lineNumber: { type: integer, minimum: 1 }
    columnNumber: { type: integer, minimum: 1 }
    fieldIndex: { type: integer, minimum: 1 }
    elementIndex: { type: integer, minimum: 1 }
    attributeIndex: { type: integer, minimum: 1 }
    blockLabel: { type: string }
    frameIndex: { type: integer, minimum: 1 }
    pageRegion:
      type: object
      additionalProperties: true
      properties:
        x: { type: number }
        y: { type: number }
        width: { type: number }
        height: { type: number }
        pageWidth: { type: number }
        pageHeight: { type: number }
        unit: { type: string }
        origin: { type: string }
        confidence: { type: string }
        ocrConfidence: { type: number }
PublicAnalysisStage:
  type: object
  required: [name]
  additionalProperties: true
  properties:
    name: { type: string }
    status: { type: string }
    description: { type: string }
PublicAnalysisResult:
  type: object
  required: [analysisId, status, file, summary, evidence, warnings, capacity]
  additionalProperties: true
  properties:
    analysisId: { type: string }
    status: { type: string, example: "completed" }
    file: { $ref: "#/PublicAnalysisFile" }
    summary: { $ref: "#/PublicAnalysisSummary" }
    analysisStages:
      type: array
      description: Optional processing and handoff stages for richer result presentation.
      items: { $ref: "#/PublicAnalysisStage" }
    governanceBoundaries:
      type: array
      description: Optional public-entry boundary notes.
      items: { type: string }
    evidence:
      type: array
      items: { $ref: "#/PublicAnalysisEvidence" }
    warnings:
      type: array
      items: { type: string }
    capacity: { $ref: "#/PublicAnalysisCapacity" }
PublicAnalysisCapacityEnvelope:
  type: object
  required: [data, meta]
  properties:
    data: { $ref: "#/PublicAnalysisCapacity" }
    meta: { $ref: "./common.yaml#/Meta" }
PublicAnalysisResultEnvelope:
  type: object
  required: [data, meta]
  properties:
    data: { $ref: "#/PublicAnalysisResult" }
    meta: { $ref: "./common.yaml#/Meta" }

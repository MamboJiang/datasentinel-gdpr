Owner:
  type: object
  required: [userId, displayName, assignmentType]
  additionalProperties: true
  properties:
    userId: { type: string }
    displayName: { type: string }
    email: { type: [string, "null"], format: email }
    assignmentType: { type: string, example: "master_of_data" }
    assignmentReason: { type: string }
    assignmentSource: { type: string }
EvidenceAnchor:
  type: object
  required: [anchorId, format, label, redactedText, selector, fallback]
  additionalProperties: true
  properties:
    anchorId: { type: string }
    format: { type: string, example: "text" }
    label: { type: string }
    redactedText: { type: string }
    selector:
      type: object
      required: [type]
      additionalProperties: true
      properties:
        type: { type: string, example: "textPosition" }
        start: { type: integer, minimum: 0 }
        end: { type: integer, minimum: 0 }
        sourceStart: { type: integer, minimum: 0 }
        sourceEnd: { type: integer, minimum: 0 }
        page: { type: integer, minimum: 1 }
        row: { type: integer, minimum: 1 }
        column: { type: integer, minimum: 1 }
        columnLabel: { type: string, example: "B" }
        sheetName: { type: string, example: "Sheet1" }
        path: { type: string, example: "word/document.xml#paragraph:1" }
        partName: { type: string, example: "word/document.xml" }
        paragraphIndex: { type: integer, minimum: 1 }
        slideNumber: { type: integer, minimum: 1 }
        shapeIndex: { type: integer, minimum: 1 }
        tagName: { type: string, example: "p" }
        nodeIndex: { type: integer, minimum: 1 }
        recordIndex: { type: integer, minimum: 1 }
        lineNumber: { type: integer, minimum: 1 }
        columnNumber: { type: integer, minimum: 1 }
        fieldIndex: { type: integer, minimum: 1 }
        elementIndex: { type: integer, minimum: 1 }
        attributeIndex: { type: integer, minimum: 1 }
        blockLabel: { type: string, example: "DOCX paragraph 1" }
        frameIndex: { type: integer, minimum: 1 }
        pageRegion:
          type: object
          additionalProperties: true
          properties:
            x: { type: number, minimum: 0 }
            y: { type: number, minimum: 0 }
            width: { type: number, minimum: 0 }
            height: { type: number, minimum: 0 }
            pageWidth: { type: number, minimum: 0 }
            pageHeight: { type: number, minimum: 0 }
            unit: { type: string, example: "pt" }
            origin: { type: string, example: "bottom_left" }
            confidence: { type: string, example: "estimated" }
            ocrConfidence: { type: number, minimum: 0, maximum: 100 }
    fallback:
      type: object
      required: [label, redactedText]
      additionalProperties: true
      properties:
        label: { type: string }
        redactedText: { type: string }
    rawContentExposed: { type: boolean, example: false }
SourceReviewPreview:
  type: object
  required: [sourcePreviewId, sourceName, fileFormat, redactionMode, rawContentExposed, pageImagesExposed]
  additionalProperties: true
  properties:
    sourcePreviewId: { type: string, example: "source_preview_7f3d2a4b9c10" }
    sourceName: { type: string, example: "supplier_onboarding_2021.pdf" }
    fileFormat: { type: string, example: "pdf_ocr" }
    extractionMethod: { type: string, example: "pdf_page_image_ocr" }
    recognitionDifficulty: { type: string, example: "hard" }
    redactionMode: { type: string, example: "anchor_only" }
    rawContentExposed: { type: boolean, example: false }
    pageImagesExposed: { type: boolean, example: false }
    anchors:
      type: array
      items:
        type: object
        required: [anchorId, label, format, redactedText, selector, rawContentExposed]
        additionalProperties: true
        properties:
          anchorId: { type: string }
          label: { type: string }
          format: { type: string }
          redactedText: { type: string }
          fallbackLabel: { type: string }
          selector:
            type: object
            additionalProperties: true
          contextWindow:
            type: object
            required: [anchorId, redactedContext, rawContentExposed]
            additionalProperties: true
            properties:
              anchorId: { type: string }
              redactedContext: { type: string }
              contextStart: { type: integer, minimum: 0 }
              contextEnd: { type: integer, minimum: 0 }
              highlightStart: { type: integer, minimum: 0 }
              highlightEnd: { type: integer, minimum: 0 }
              redactionMode: { type: string, example: "signal_span_context" }
              rawContentExposed: { type: boolean, example: false }
          confidence: { type: number, minimum: 0, maximum: 1 }
          rawContentExposed: { type: boolean, example: false }
    contextWindows:
      type: array
      items:
        type: object
        required: [anchorId, redactedContext, rawContentExposed]
        additionalProperties: true
        properties:
          anchorId: { type: string }
          redactedContext: { type: string }
          contextStart: { type: integer, minimum: 0 }
          contextEnd: { type: integer, minimum: 0 }
          highlightStart: { type: integer, minimum: 0 }
          highlightEnd: { type: integer, minimum: 0 }
          redactionMode: { type: string, example: "signal_span_context" }
          rawContentExposed: { type: boolean, example: false }
    pages:
      type: array
      items:
        type: object
        required: [page, label, regions, pageImageExposed]
        additionalProperties: true
        properties:
          page: { type: integer, minimum: 1 }
          label: { type: string }
          unit: { type: string, example: "px" }
          origin: { type: string, example: "top_left" }
          coordinateSystem: { type: string, example: "image_pixels_top_left" }
          width: { type: number }
          height: { type: number }
          pageImageExposed: { type: boolean, example: false }
          regions:
            type: array
            items:
              type: object
              required: [anchorId, label, redactedText, region, rawContentExposed]
              additionalProperties: true
              properties:
                anchorId: { type: string }
                label: { type: string }
                redactedText: { type: string }
                region:
                  type: object
                  additionalProperties: true
                rawContentExposed: { type: boolean, example: false }
    textRanges:
      type: array
      items: { type: object, additionalProperties: true }
    tableCells:
      type: array
      items: { type: object, additionalProperties: true }
    structureBlocks:
      type: array
      items: { type: object, additionalProperties: true }
    warnings:
      type: array
      items: { type: string }
Signal:
  type: object
  required: [type, detector, confidence, snippet]
  additionalProperties: true
  properties:
    type: { type: string }
    detector: { type: string }
    confidence: { type: number, minimum: 0, maximum: 1 }
    snippet: { type: string }
    page: { type: [integer, "null"] }
    evidenceAnchor: { $ref: "#/EvidenceAnchor" }
AuditEvidenceReference:
  type: object
  required: [type, id]
  additionalProperties: true
  properties:
    type: { type: string }
    id: { type: string }
    label: { type: string }
AuditEvent:
  type: object
  required: [auditEventId, eventType, actorId, occurredAt]
  additionalProperties: true
  properties:
    auditEventId: { type: string }
    scanId: { type: [string, "null"] }
    findingId: { type: [string, "null"] }
    eventType: { type: string }
    actorId: { type: string }
    actorType: { type: string, example: "human" }
    occurredAt: { type: string, format: date-time }
    recordedAt: { type: string, format: date-time }
    auditRecordVersion: { type: string }
    objectType: { type: string, example: "review_decision" }
    objectId: { type: string }
    action: { type: string, example: "record_review_decision" }
    outcome: { type: string, example: "delete_candidate" }
    stage: { type: string, example: "recording_audit_events" }
    sourceId: { type: string }
    previousState: { type: [string, "null"] }
    resultingState: { type: [string, "null"] }
    summary: { type: string }
    evidenceReferences:
      type: array
      items: { $ref: "#/AuditEvidenceReference" }
    decision: { type: string }
    reason: { type: string }
    resultingStatus: { type: string }
    targetId: { type: string }
    targetLabel: { type: string }
    retentionUntil: { type: [string, "null"], format: date }
    deletionExecuted: { type: boolean }
    policyPackVersion: { type: string }
    permissionBoundaryFingerprint: { type: string }
    reviewSupportRulesFingerprint: { type: string }
    idempotencyKey: { type: string }
    rawContentExposed: { type: boolean }
    legalConclusionProvided: { type: boolean }
FindingSummary:
  type: object
  required: [findingId, fileName, riskLevel, riskScore, status]
  additionalProperties: true
  properties:
    findingId: { type: string }
    scanId: { type: string }
    fileName: { type: string }
    sourcePath: { type: string }
    riskLevel: { type: string, example: "high" }
    riskScore: { type: integer, minimum: 0, maximum: 100 }
    contextCategory: { type: string, example: "supplier_onboarding" }
    personalDataTypes:
      type: array
      items: { type: string }
    retentionStatus: { type: string, example: "overdue" }
    recommendedAction: { type: string, example: "escalate" }
    evidenceSignalCount: { type: integer, minimum: 0 }
    policyPackVersion: { type: string }
    status: { type: string, example: "open" }
    owner: { $ref: "#/Owner" }
    policyContext:
      type: object
      additionalProperties: true
    availableActions:
      type: array
      items: { type: string }
    deniedActions:
      type: array
      items:
        type: object
        additionalProperties: true
Finding:
  allOf:
    - $ref: "#/FindingSummary"
    - type: object
      additionalProperties: true
      properties:
        file:
          type: object
          additionalProperties: true
        signals:
          type: array
          items: { $ref: "#/Signal" }
        sourceReviewPreview: { $ref: "#/SourceReviewPreview" }
        riskExplanation: { type: string }
        auditTimeline:
          type: array
          items: { $ref: "#/AuditEvent" }
FindingEnvelope:
  type: object
  required: [data, meta]
  properties:
    data: { $ref: "#/Finding" }
    meta: { $ref: "./common.yaml#/Meta" }
FindingListEnvelope:
  type: object
  required: [data, meta]
  properties:
    data:
      type: array
      items: { $ref: "#/FindingSummary" }
    pagination: { $ref: "./common.yaml#/Pagination" }
    meta: { $ref: "./common.yaml#/Meta" }
ReviewRequest:
  type: object
  required: [decision, reason, actorId]
  additionalProperties: true
  properties:
    decision: { type: string, example: "delete_candidate" }
    reason: { type: string, minLength: 1 }
    actorId: { type: string }
    nextAction: { type: [string, "null"] }
    retentionUntil: { type: [string, "null"], format: date }
    reassignToUserId: { type: [string, "null"] }
    checklistItemIds:
      type: array
      items: { type: string }
ReviewRecord:
  type: object
  required: [reviewId, findingId, decision, reason, actorId, createdAt]
  additionalProperties: true
  properties:
    reviewId: { type: string }
    findingId: { type: string }
    decision: { type: string }
    reason: { type: string }
    actorId: { type: string }
    createdAt: { type: string, format: date-time }
    resultingStatus: { type: string }
    auditEventId: { type: string }
    targetId: { type: string }
    targetLabel: { type: string }
    retentionUntil: { type: [string, "null"], format: date }
    deletionExecuted: { type: boolean }
    policyPackVersion: { type: string }
    permissionBoundaryFingerprint: { type: string }
    reviewSupportRulesFingerprint: { type: string }
    idempotencyKey: { type: string }
ReviewEnvelope:
  type: object
  required: [data, meta]
  properties:
    data: { $ref: "#/ReviewRecord" }
    meta: { $ref: "./common.yaml#/Meta" }
AuditEventListEnvelope:
  type: object
  required: [data, meta]
  properties:
    data:
      type: array
      items: { $ref: "#/AuditEvent" }
    pagination: { $ref: "./common.yaml#/Pagination" }
    meta: { $ref: "./common.yaml#/Meta" }

openapi: 3.1.0
info:
  title: lawdit API
  version: 0.1.0
  summary: Contract-first API for the GDPR discovery prototype.
servers:
  - url: /api
paths:
  /auth/providers:
    get:
      operationId: listAuthProviders
      responses:
        "200":
          description: Configured login providers without secrets.
          content:
            application/json:
              schema:
                $ref: "./schemas/common.yaml#/AuthProviderListEnvelope"
  /auth/login/{provider}:
    get:
      operationId: startAuthLogin
      parameters:
        - $ref: "#/components/parameters/AuthProvider"
      responses:
        "302":
          description: Redirect to the selected OAuth provider.
        default:
          $ref: "#/components/responses/Problem"
  /auth/callback/{provider}:
    get:
      operationId: completeAuthCallback
      parameters:
        - $ref: "#/components/parameters/AuthProvider"
      responses:
        "302":
          description: Redirect back to the frontend after session creation or failure.
        default:
          $ref: "#/components/responses/Problem"
  /auth/session:
    get:
      operationId: getAuthSession
      responses:
        "200":
          description: Current first-party session state.
          content:
            application/json:
              schema:
                $ref: "./schemas/common.yaml#/AuthSessionEnvelope"
  /auth/logout:
    post:
      operationId: logoutAuthSession
      responses:
        "200":
          description: Session revoked.
          content:
            application/json:
              schema:
                $ref: "./schemas/common.yaml#/AuthSessionEnvelope"
  /workspaces:
    get:
      operationId: listVisibleWorkspaces
      responses:
        "200":
          description: Workspaces visible to the current account and any legacy account-targeted pending invitations.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceDirectoryEnvelope"
    post:
      operationId: createWorkspace
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/workspace.yaml#/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created and creator joined as Workspace owner and Workspace admin.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceDirectoryEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /workspaces/current:
    post:
      operationId: switchCurrentWorkspace
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/workspace.yaml#/SwitchWorkspaceRequest"
      responses:
        "200":
          description: Current Workspace context switched for the signed-in account.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceDirectoryEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /workspaces/current/admin:
    get:
      operationId: getCurrentWorkspaceAdminSummary
      responses:
        "200":
          description: Workspace administrator summary, permission boundary, and charts for the current account context.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceAdminSummaryEnvelope"
  /workspaces/{workspaceId}:
    patch:
      operationId: updateWorkspaceSettings
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/workspace.yaml#/UpdateWorkspaceSettingsRequest"
      responses:
        "200":
          description: Workspace profile settings updated inside the actor's permission boundary.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceEnvelope"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteWorkspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/workspace.yaml#/DeleteWorkspaceRequest"
      responses:
        "200":
          description: Workspace soft-deleted after exact-name confirmation; active memberships are removed and pending invitations are revoked.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /workspaces/{workspaceId}/owner-transfer:
    post:
      operationId: transferWorkspaceOwner
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/workspace.yaml#/TransferWorkspaceOwnerRequest"
      responses:
        "200":
          description: Workspace owner authority transferred to an active member.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceMembershipEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /workspaces/{workspaceId}/groups:
    post:
      operationId: createWorkspaceGroup
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/workspace.yaml#/CreateWorkspaceGroupRequest"
      responses:
        "201":
          description: Workspace group created with explicit permissions.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceGroupEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /workspaces/{workspaceId}/groups/{groupId}:
    patch:
      operationId: updateWorkspaceGroup
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/workspace.yaml#/UpdateWorkspaceGroupRequest"
      responses:
        "200":
          description: Workspace group name, description, and permissions updated.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceGroupEnvelope"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteWorkspaceGroup
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Workspace group deleted; memberships and pending invite links no longer reference it.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceGroupEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /workspaces/{workspaceId}/members/{membershipId}:
    patch:
      operationId: updateWorkspaceMember
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MembershipId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/workspace.yaml#/UpdateWorkspaceMemberRequest"
      responses:
        "200":
          description: Workspace member group assignment updated.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceMembershipEnvelope"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteWorkspaceMember
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MembershipId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Workspace member removed from active membership.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceMembershipEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /workspaces/{workspaceId}/invitations:
    post:
      operationId: createWorkspaceInvitation
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/workspace.yaml#/CreateWorkspaceInvitationRequest"
      responses:
        "201":
          description: Workspace invitation link created.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceInvitationEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /workspaces/invitations/{invitationId}/accept:
    post:
      operationId: acceptWorkspaceInvitation
      parameters:
        - $ref: "#/components/parameters/InvitationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Workspace invitation accepted by the signed-in account that opens the link.
          content:
            application/json:
              schema:
                $ref: "./schemas/workspace.yaml#/WorkspaceDirectoryEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Backend readiness.
          content:
            application/json:
              schema:
                $ref: "./schemas/common.yaml#/HealthEnvelope"
  /public-analysis/capacity:
    get:
      operationId: getPublicAnalysisCapacity
      parameters:
        - $ref: "#/components/parameters/TrialSession"
      responses:
        "200":
          description: Current public analysis capacity, waiting count, per-session active state, and file-size limit.
          content:
            application/json:
              schema:
                $ref: "./schemas/public-analysis.yaml#/PublicAnalysisCapacityEnvelope"
  /public-analysis/analyze:
    post:
      operationId: analyzePublicUpload
      parameters:
        - $ref: "#/components/parameters/TrialSession"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              additionalProperties: false
              properties:
                file:
                  type: string
                  format: binary
                  description: One public analysis file, maximum 10 MB.
      responses:
        "200":
          description: Short redacted analysis result for the uploaded file.
          content:
            application/json:
              schema:
                $ref: "./schemas/public-analysis.yaml#/PublicAnalysisResultEnvelope"
        "409":
          $ref: "#/components/responses/Problem"
        "413":
          $ref: "#/components/responses/Problem"
        "415":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
        "429":
          $ref: "#/components/responses/Problem"
        default:
          $ref: "#/components/responses/Problem"
  /integrations/google-drive/picker-config:
    get:
      operationId: getGoogleDrivePickerConfig
      responses:
        "200":
          description: Public Google Drive Picker setup state. Provider secrets and tokens are never returned.
          content:
            application/json:
              schema:
                $ref: "./schemas/common.yaml#/GoogleDrivePickerConfigEnvelope"
  /integrations/google-drive/binding:
    get:
      operationId: getGoogleDriveBinding
      responses:
        "200":
          description: Account-scoped Google Drive binding status. Provider tokens and refresh tokens are never returned.
          content:
            application/json:
              schema:
                $ref: "./schemas/common.yaml#/GoogleDriveBindingEnvelope"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: disconnectGoogleDriveBinding
      responses:
        "200":
          description: Local account Drive binding removed; provider-token revocation is attempted when a token exists.
          content:
            application/json:
              schema:
                $ref: "./schemas/common.yaml#/GoogleDriveBindingEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /integrations/google-drive/picker-token:
    post:
      operationId: createGoogleDrivePickerToken
      responses:
        "200":
          description: Short-lived browser-use Picker access token minted from the current account Drive binding.
          content:
            application/json:
              schema:
                $ref: "./schemas/common.yaml#/GoogleDrivePickerTokenEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /integrations/google-drive/bind/start:
    get:
      operationId: startGoogleDriveBinding
      responses:
        "302":
          description: Redirects the signed-in user to Google OAuth consent for Drive binding.
        default:
          $ref: "#/components/responses/Problem"
  /integrations/google-drive/bind/callback:
    get:
      operationId: completeGoogleDriveBinding
      responses:
        "302":
          description: Completes Google OAuth binding and redirects back to the frontend with driveBinding status query parameters.
  /sources:
    get:
      operationId: listSources
      responses:
        "200":
          description: Source list.
          content:
            application/json:
              schema:
                $ref: "./schemas/source-scan.yaml#/SourceListEnvelope"
    post:
      operationId: createSource
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/source-scan.yaml#/CreateSourceRequest"
      responses:
        "201":
          description: Created source.
          content:
            application/json:
              schema:
                $ref: "./schemas/source-scan.yaml#/SourceEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /sources/{sourceId}:
    patch:
      operationId: updateSource
      parameters:
        - $ref: "#/components/parameters/SourceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/source-scan.yaml#/UpdateSourceRequest"
      responses:
        "200":
          description: Source metadata updated. Source files are not mutated.
          content:
            application/json:
              schema:
                $ref: "./schemas/source-scan.yaml#/SourceEnvelope"
        default:
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteSource
      parameters:
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          description: Deleted source registration. External source files are not deleted.
          content:
            application/json:
              schema:
                $ref: "./schemas/source-scan.yaml#/SourceEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /sources/{sourceId}/connect-test:
    post:
      operationId: testSourceConnection
      parameters:
        - $ref: "#/components/parameters/SourceId"
      responses:
        "200":
          description: Connection test result.
          content:
            application/json:
              schema:
                $ref: "./schemas/source-scan.yaml#/ConnectionTestEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /scans/full:
    post:
      operationId: startFullScan
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/source-scan.yaml#/StartFullScanRequest"
      responses:
        "202":
          description: Full scan accepted.
          content:
            application/json:
              schema:
                $ref: "./schemas/source-scan.yaml#/ScanEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /scans/delta:
    post:
      operationId: startDeltaScan
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/source-scan.yaml#/StartDeltaScanRequest"
      responses:
        "202":
          description: Delta scan accepted.
          content:
            application/json:
              schema:
                $ref: "./schemas/source-scan.yaml#/ScanEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /scans/{scanId}:
    get:
      operationId: getScan
      parameters:
        - $ref: "#/components/parameters/ScanId"
      responses:
        "200":
          description: Scan status and progress.
          content:
            application/json:
              schema:
                $ref: "./schemas/source-scan.yaml#/ScanEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /scans/{scanId}/summary:
    get:
      operationId: getScanSummary
      parameters:
        - $ref: "#/components/parameters/ScanId"
      responses:
        "200":
          description: Scan KPI summary.
          content:
            application/json:
              schema:
                $ref: "./schemas/metrics.yaml#/AdminMetricsEnvelope"
  /findings:
    get:
      operationId: listFindings
      parameters:
        - name: scanId
          in: query
          schema: { type: string }
        - name: ownerId
          in: query
          schema: { type: string }
        - name: riskLevel
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Finding list.
          content:
            application/json:
              schema:
                $ref: "./schemas/finding-review.yaml#/FindingListEnvelope"
  /findings/{findingId}:
    get:
      operationId: getFinding
      parameters:
        - $ref: "#/components/parameters/FindingId"
      responses:
        "200":
          description: Evidence card.
          content:
            application/json:
              schema:
                $ref: "./schemas/finding-review.yaml#/FindingEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /findings/{findingId}/review:
    post:
      operationId: reviewFinding
      parameters:
        - $ref: "#/components/parameters/FindingId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/finding-review.yaml#/ReviewRequest"
      responses:
        "201":
          description: Review decision recorded.
          content:
            application/json:
              schema:
                $ref: "./schemas/finding-review.yaml#/ReviewEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /findings/{findingId}/review-support:
    get:
      operationId: getFindingReviewSupport
      parameters:
        - $ref: "#/components/parameters/FindingId"
        - name: actorId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Reviewer guidance and permission-aware action support.
          content:
            application/json:
              schema:
                $ref: "./schemas/governance.yaml#/ReviewSupportEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /audit/events:
    get:
      operationId: listAuditEvents
      parameters:
        - name: scanId
          in: query
          schema: { type: string }
        - name: findingId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Audit events.
          content:
            application/json:
              schema:
                $ref: "./schemas/finding-review.yaml#/AuditEventListEnvelope"
  /admin/metrics:
    get:
      operationId: getAdminMetrics
      responses:
        "200":
          description: Admin dashboard metrics.
          content:
            application/json:
              schema:
                $ref: "./schemas/metrics.yaml#/AdminMetricsEnvelope"
  /evaluation/runs/latest:
    get:
      operationId: getLatestEvaluationRun
      responses:
        "200":
          description: Latest evaluation run.
          content:
            application/json:
              schema:
                $ref: "./schemas/metrics.yaml#/EvaluationEnvelope"
  /governance/config:
    get:
      operationId: getGovernanceConfig
      responses:
        "200":
          description: Active governance configuration for admin and UI setup.
          content:
            application/json:
              schema:
                $ref: "./schemas/governance.yaml#/GovernanceConfigEnvelope"
  /governance/policy-packs/active:
    get:
      operationId: getActivePolicyPack
      responses:
        "200":
          description: Active policy pack.
          content:
            application/json:
              schema:
                $ref: "./schemas/governance.yaml#/PolicyPackEnvelope"
  /governance/changes/preview:
    post:
      operationId: previewGovernanceChange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./schemas/governance.yaml#/GovernanceChangePreviewRequest"
      responses:
        "200":
          description: Preview of governance change impact.
          content:
            application/json:
              schema:
                $ref: "./schemas/governance.yaml#/GovernanceChangePreviewEnvelope"
        default:
          $ref: "#/components/responses/Problem"
  /users/me/permissions:
    get:
      operationId: getMyPermissionBoundary
      parameters:
        - name: actorId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Current user's permission boundary and action scope.
          content:
            application/json:
              schema:
                $ref: "./schemas/governance.yaml#/PermissionBoundaryEnvelope"
components:
  parameters:
    AuthProvider:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum: [google, github]
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string }
    TrialSession:
      name: X-Lawdit-Trial-Session
      in: header
      required: false
      schema: { type: string }
      description: Browser-generated public analysis session identifier used only for transient capacity accounting.
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema: { type: string }
    GroupId:
      name: groupId
      in: path
      required: true
      schema: { type: string }
    MembershipId:
      name: membershipId
      in: path
      required: true
      schema: { type: string }
    InvitationId:
      name: invitationId
      in: path
      required: true
      schema: { type: string }
    SourceId:
      name: sourceId
      in: path
      required: true
      schema: { type: string }
    ScanId:
      name: scanId
      in: path
      required: true
      schema: { type: string }
    FindingId:
      name: findingId
      in: path
      required: true
      schema: { type: string }
  responses:
    Problem:
      description: Problem details error.
      content:
        application/problem+json:
          schema:
            $ref: "./schemas/common.yaml#/Problem"
